<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TariWallet</title>
    <link rel="icon" href="/tari-logo.png?v=2" />
  </head>
  <body>
    <script>
      // Apply theme before React loads to prevent flash
      try {
        const stored = JSON.parse(localStorage.getItem("tariswap-wallet") || "{}");
        if (stored?.state?.theme === "dark" || (!stored?.state?.theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
